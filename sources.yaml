# 몽골(MN) 크롤링 소스 메타 — 3계층 아키텍처
country: "MN"
currency: "MNT"

sources:
  # ── Tier 1: 규제·인허가 ──────────────────────────────────────────────────────

  mmra_regulatory:
    tier: 1
    url_seed: "https://mmra.gov.mn"
    access_method: playwright
    rate_limit_qps: 0.3
    cron_slot: "0 22 * * *"
